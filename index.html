<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Pro Tool</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 95%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .section {
            margin: 25px 0;
        }
        
        h3 {
            margin-bottom: 10px;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: #667eea;
        }
        
        #drop-zone {
            border: 2px dashed #667eea;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            background: #f0f4ff;
            cursor: pointer;
            transition: 0.3s;
        }
        
        #drop-zone:hover {
            background: #e0e7ff;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        canvas {
            margin-top: 20px;
            border-radius: 10px;
        }
        
        a {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            font-weight: bold;
            text-decoration: none;
        }
        
        pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: left;
            word-wrap: break-word;
        }
        
        img {
            margin-top: 10px;
            max-width: 100%;
            border-radius: 10px;
            display: none;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            animation: fade 3s forwards;
        }
        
        @keyframes fade {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>🔳 QR Code Pro Tool</h1>

        <!-- GENERATOR -->

        <div class="section">
            <h3>Generate QR</h3>

            ```
            <input type="text" id="text-input" placeholder="Enter text or URL">
            <input type="file" id="image-input" accept="image/*">

            <div id="drop-zone">📂 Drag & Drop Image</div>

            <button onclick="generateQR()">Generate QR</button>

            <canvas id="qr-code"></canvas>
            <a id="download-link" download="qr.png" style="display:none;">⬇ Download QR</a> ```

        </div>

        <!-- SCANNER -->

        <div class="section">
            <h3>Scan QR</h3>

            ```
            <input type="file" id="qr-scan-input" accept="image/*">
            <button onclick="decodeQR()">Scan QR</button>

            <pre id="decoded-output"></pre>
            <img id="scan-image"> ```

        </div>
    </div>

    <!-- Libraries -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <script>
        const qrCanvas = document.getElementById('qr-code');
        const qr = new QRious({
            element: qrCanvas,
            size: 250
        });

        // Drag & Drop
        const dropZone = document.getElementById('drop-zone');

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.style.background = '#dbeafe';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.background = '#f0f4ff';
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.style.background = '#f0f4ff';

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('image-input').files = files;
                showToast("Image selected!");
            }
        });

        // Generate QR
        function generateQR() {
            const text = document.getElementById('text-input').value.trim();
            const file = document.getElementById('image-input').files[0];

            if (file) {
                if (!file.type.startsWith('image/')) {
                    alert("Upload a valid image");
                    return;
                }

                const reader = new FileReader();
                reader.onload = () => {
                    qr.value = reader.result;
                    showDownload();
                    copyToClipboard(qr.value);
                    showToast("QR generated from image!");
                };
                reader.readAsDataURL(file);

            } else if (text) {
                qr.value = text;
                showDownload();
                copyToClipboard(text);
                showToast("QR generated from text!");

            } else {
                alert("Enter text or upload image");
            }
        }

        // Download
        function showDownload() {
            const link = document.getElementById('download-link');
            link.href = qrCanvas.toDataURL('image/png');
            link.style.display = 'inline';
        }

        // Decode QR
        function decodeQR() {
            const file = document.getElementById('qr-scan-input').files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = () => {
                const img = new Image();

                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    canvas.width = img.width;
                    canvas.height = img.height;

                    ctx.drawImage(img, 0, 0);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);

                    const output = document.getElementById('decoded-output');
                    const scanImg = document.getElementById('scan-image');

                    output.textContent = "";
                    scanImg.style.display = "none";

                    if (code) {
                        const data = code.data;
                        output.textContent = data;

                        if (data.startsWith("http")) {
                            output.innerHTML += `<br><a href="${data}" target="_blank">🔗 Open Link</a>`;
                        }

                        if (data.startsWith("data:image/")) {
                            scanImg.src = data;
                            scanImg.style.display = "block";
                        }

                    } else {
                        output.textContent = "❌ No QR code found";
                    }
                };

                img.src = reader.result;
            };

            reader.readAsDataURL(file);
        }

        // Clipboard
        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).catch(() => {});
            }
        }

        // Toast
        function showToast(msg) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = msg;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 3000);
        }
    </script>

</body>

</html>
